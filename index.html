<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Support</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:700px;
    padding:40px;
}

.card{
    display:block;
    text-decoration:none;
    color:#fff;

    background:#14141d;

    border-radius:22px;

    padding:38px;

    margin-bottom:28px;

    text-align:center;

    font-size:2rem;

    font-weight:700;

    transition:.25s;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.card:hover{
    transform:scale(1.02);
    background:#1b1b28;
}

.subtitle{

    text-align:center;

    color:#777790;

    margin-bottom:45px;

    font-size:1rem;

    letter-spacing:.18em;

    text-transform:uppercase;

    font-weight:600;
}
</style>

</head>

<body>

<div class="container">

<div class="subtitle">
MX Support
</div>

<a class="card" href="subscription.html">
Streaming Subscription
</a>

<a class="card" href="support.html">
Support
</a>

</div>

</body>

</html>
