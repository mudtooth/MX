<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="color-scheme" content="dark">

<title>Support</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    overflow:hidden;

    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
}

.container{
    width:100%;
    max-width:600px;
    padding:28px;
    text-align:center;
}

.card{
    background:transparent;
    border:none;
    border-radius:0;
    padding:0;
    box-shadow:none;
}

.title{
    font-size:1.75rem;
    font-weight:700;
    margin-bottom:22px;
}

.qr-wrapper{
    position:relative;
    display:inline-block;
    width:260px;
    height:260px;
    background:#ffffff;
    border-radius:18px;
    padding:16px;
}

.qr-wrapper img{
    width:100%;
    height:100%;
    display:block;
    border-radius:6px;
}

.wa-badge{
    position:absolute;
    bottom:-13px;
    left:50%;
    transform:translateX(-50%);
    background:#25D366;
    color:#fff;
    border-radius:40px;
    padding:5px 16px 5px 11px;
    display:flex;
    align-items:center;
    gap:7px;
    white-space:nowrap;
    font-size:.72rem;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    box-shadow:0 4px 16px rgba(37,211,102,.35);
}

.wa-badge svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.message{
    margin-top:34px;
    max-width:420px;
    margin-left:auto;
    margin-right:auto;
    font-size:1.2rem;
    font-weight:700;
    line-height:1.35;
}

.message span{
    color:#25D366;
}

.sub{
    margin-top:10px;
    max-width:360px;
    margin-left:auto;
    margin-right:auto;
    color:#777790;
    font-size:.85rem;
    line-height:1.4;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
Need Help?
</div>

<div class="qr-wrapper">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&margin=0&data=https://wa.me/35799881615"
alt="WhatsApp QR Code"
loading="eager"
decoding="async">

<div class="wa-badge">

<svg viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
<path d="M12.001 2C6.478 2 2 6.478 2 12.001c0 1.75.458 3.444 1.328 4.94L2.05 21.95l5.13-1.348A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12.001 2zm0 18a7.95 7.95 0 01-4.07-1.118l-.292-.173-3.045.8.815-2.974-.19-.306A7.96 7.96 0 014 12c0-4.411 3.589-8 8.001-8C16.41 4 20 7.589 20 12s-3.589 8-7.999 8zm4.39-5.907c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.013-.373-1.93-1.19-.713-.636-1.194-1.42-1.334-1.66-.14-.24-.015-.37.105-.49.108-.108.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.195-.468-.393-.404-.54-.412l-.46-.008c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.693 2.585 4.103 3.625.574.248 1.021.396 1.37.507.576.183 1.1.157 1.514.095.462-.069 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28z"/>
</svg>

WhatsApp

</div>

</div>

<div class="message">
Scan with your phone<br>
to reach us on <span>WhatsApp</span>
</div>

<div class="sub">
We'll get back to you as soon as possible.
</div>

</div>

</div>

</body>

</html>
