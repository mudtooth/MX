<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:760px;
    padding:40px;
    text-align:center;
}

.card{

    background:#15151f;

    border-radius:28px;

    padding:32px 40px;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:0 20px 50px rgba(0,0,0,.45);

}

.title{

    font-size:2rem;

    font-weight:700;

    margin-bottom:28px;

}

.qr-wrapper{

    position:relative;

    width:300px;

    height:300px;

    margin:0 auto;

    background:#ffffff;

    border-radius:22px;

    padding:18px;

}

.qr-wrapper img{

    width:100%;

    height:100%;

    display:block;

    border-radius:8px;

}

.wa-badge{

    position:absolute;

    bottom:-18px;

    left:50%;

    transform:translateX(-50%);

    background:#25D366;

    border-radius:40px;

    padding:6px 18px 6px 12px;

    display:flex;

    align-items:center;

    gap:8px;

    white-space:nowrap;

    font-size:.78rem;

    font-weight:700;

    letter-spacing:.08em;

    text-transform:uppercase;

    color:#fff;

    box-shadow:0 4px 16px rgba(37,211,102,.35);

}

.wa-badge svg{

    width:18px;

    height:18px;

    flex-shrink:0;

}

.message{

    margin-top:48px;

    font-size:1.45rem;

    font-weight:700;

    line-height:1.35;

}

.message span{

    color:#25D366;

}

.sub{

    margin-top:12px;

    color:#777790;

    font-size:.95rem;

}

.back{

    display:inline-block;

    margin-top:24px;

    color:#9b9bb7;

    text-decoration:none;

    font-size:.95rem;

    transition:.2s;

}

.back:hover{

    color:#fff;

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">
Need Help?
</div>

<div class="qr-wrapper">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=https://wa.me/35799881615"
alt="WhatsApp QR Code">

<div class="wa-badge">

<svg viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
<path d="M12.001 2C6.478 2 2 6.478 2 12.001c0 1.75.458 3.444 1.328 4.94L2.05 21.95l5.13-1.348A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12.001 2zm0 18a7.95 7.95 0 01-4.07-1.118l-.292-.173-3.045.8.815-2.974-.19-.306A7.96 7.96 0 014 12c0-4.411 3.589-8 8.001-8C16.41 4 20 7.589 20 12s-3.589 8-7.999 8zm4.39-5.907c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.013-.373-1.93-1.19-.713-.636-1.194-1.42-1.334-1.66-.14-.24-.015-.37.105-.49.108-.108.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.195-.468-.393-.404-.54-.412l-.46-.008c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.693 2.585 4.103 3.625.574.248 1.021.396 1.37.507.576.183 1.1.157 1.514.095.462-.069 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28z"/>
</svg>

WhatsApp

</div>

</div>

<div class="message">
Scan with your phone<br>to reach us on <span>WhatsApp</span>
</div>

<div class="sub">
We'll get back to you as soon as possible.
</div>

</div>

<a class="back" href="index.html">
← Back
</a>

</div>

</body>
</html>
