<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Subscription</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:600px;
    padding:28px;
    text-align:center;
}

/* ---------- Status Card ---------- */

.status-card{
    background:#15151f;
    border-radius:24px;
    padding:26px 32px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 16px 40px rgba(0,0,0,.42);
    margin-bottom:18px;
}

.status{
    position:relative;
    display:inline-block;
    font-size:2.2rem;
    font-weight:700;
    line-height:1;
    margin-bottom:26px;
}

.status-dot{
    position:absolute;
    width:18px;
    height:18px;
    left:-32px;
    top:50%;
    transform:translateY(-50%);
    border-radius:50%;
    background:#25D366;
}

.label{
    color:#777790;
    font-size:.8rem;
    font-weight:600;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:8px;
}

.value{
    font-size:1.65rem;
    font-weight:700;
    margin-bottom:22px;
}

.value:last-child{
    margin-bottom:0;
}

/* ---------- Renew Button ---------- */

.button{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    height:74px;

    background:#1d1d2b;

    color:#fff;

    text-decoration:none;

    border-radius:24px;

    border:1px solid rgba(255,255,255,.05);

    font-size:1.3rem;
    font-weight:700;

    box-shadow:0 16px 40px rgba(0,0,0,.42);

    transition:.18s ease;
}

.button:hover,
.button:focus{
    background:#1b1b28;

    transform:scale(1.03);

    border-color:rgba(79,140,255,.35);

    box-shadow:
        0 0 0 2px rgba(79,140,255,.15),
        0 0 35px rgba(79,140,255,.18),
        0 25px 60px rgba(0,0,0,.55);

    outline:none;
}

.button:active{
    transform:scale(.985);
}

/* ---------- API Key ---------- */

.api{
    display:inline-block;
    margin-top:18px;
    color:#9b9bb7;
    text-decoration:none;
    font-size:.9rem;
    transition:.2s;
}

.api:hover{
    color:#ffffff;
}

</style>
</head>

<body>

<div class="container">

    <div class="status-card">

        <div class="status">
            <span class="status-dot"></span>
            Active
        </div>

        <div class="label">Expires</div>
        <div class="value">15 August 2026</div>

        <div class="label">Remaining</div>
        <div class="value">23 Days</div>

    </div>

    <a class="button" href="#">
        Renew Subscription
    </a>

    <a class="api" href="apikey.html">
        API Key
    </a>

</div>

</body>
</html>
