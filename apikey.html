<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Key</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:760px;
    padding:40px;
    text-align:center;
}

.card{
    background:#15151f;
    border-radius:28px;
    padding:32px 40px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 20px 50px rgba(0,0,0,.45);
}

.title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:28px;
}

.qr{
    display:inline-block;
    width:300px;
    height:300px;
    background:#ffffff;
    border-radius:22px;
    padding:18px;
    transition:.2s ease;
}

.qr:hover{
    transform:scale(1.02);
}

.qr img{
    width:100%;
    height:100%;
    display:block;
    border-radius:8px;
}

.back{
    display:inline-block;
    margin-top:24px;
    color:#9b9bb7;
    text-decoration:none;
    font-size:.95rem;
    transition:.2s;
}

.back:hover{
    color:#ffffff;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
API Key
</div>

<a
class="qr"
href="https://example.com"
target="_blank">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://example.com"
alt="API Key QR Code">

</a>

</div>

<a class="back" href="subscription.html">
← Back
</a>

</div>

</body>
</html>
