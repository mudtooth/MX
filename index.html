<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:760px;
    padding:40px;
}

.card{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    height:155px;

    margin:28px 0;

    text-decoration:none;
    color:#fff;

    background:#15151f;

    border-radius:28px;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:
        0 20px 50px rgba(0,0,0,.45);

    font-size:2rem;
    font-weight:700;

    transition:
        transform .18s ease,
        box-shadow .18s ease,
        background .18s ease,
        border-color .18s ease;
}

.card:hover,
.card:focus{
    background:#1b1b28;

    transform:scale(1.03);

    border-color:rgba(79,140,255,.35);

    box-shadow:
        0 0 0 2px rgba(79,140,255,.15),
        0 0 35px rgba(79,140,255,.18),
        0 25px 60px rgba(0,0,0,.55);

    outline:none;
}

.card:active{
    transform:scale(.985);
}
</style>

</head>

<body>

<div class="container">

<a class="card" href="subscription.html">
Streaming Subscription
</a>

<a class="card" href="support.html">
Support
</a>

</div>

</body>
</html>
